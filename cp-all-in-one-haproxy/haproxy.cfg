global
  log /dev/stdout local0

defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option http-server-close
    option                  redispatch
    retries                 3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeout check           10s
    maxconn                 3000

frontend www-http
   bind *:80
   default_backend www-backend

frontend www-https
   bind *:443 ssl crt /etc/ssl/private/mydomain.pem
   default_backend www-backend

backend www-backend
   server rest-proxy rest-proxy:8082 check

listen stats 
    bind :8000
    mode http
    stats enable
    stats hide-version
    stats realm Haproxy\ Statistics
    stats uri /
    stats auth admin:admin
